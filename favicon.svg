<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#232a38"/>
      <stop offset="1" stop-color="#12151c"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7b84a"/>
      <stop offset="1" stop-color="#e08e12"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <g transform="rotate(-38 256 256)">
    <!-- ネック -->
    <rect x="238" y="30" width="36" height="230" rx="6" fill="#8a5a2b"/>
    <!-- ヘッド -->
    <rect x="230" y="10" width="52" height="66" rx="10" fill="#5d3a18"/>
    <!-- ペグ -->
    <circle cx="222" cy="28" r="7" fill="#d8dee9"/>
    <circle cx="222" cy="52" r="7" fill="#d8dee9"/>
    <circle cx="222" cy="76" r="7" fill="#d8dee9"/>
    <circle cx="290" cy="28" r="7" fill="#d8dee9"/>
    <circle cx="290" cy="52" r="7" fill="#d8dee9"/>
    <circle cx="290" cy="76" r="7" fill="#d8dee9"/>
    <!-- フレット -->
    <rect x="238" y="110" width="36" height="6" fill="#5d3a18"/>
    <rect x="238" y="150" width="36" height="6" fill="#5d3a18"/>
    <rect x="238" y="190" width="36" height="6" fill="#5d3a18"/>
    <!-- ボディ（くびれ付き） -->
    <path d="M256 240
             C 200 240 178 272 180 308
             C 182 338 200 350 200 376
             C 200 416 226 452 256 452
             C 286 452 312 416 312 376
             C 312 350 330 338 332 308
             C 334 272 312 240 256 240 Z"
          fill="url(#body)"/>
    <!-- サウンドホール -->
    <circle cx="256" cy="330" r="44" fill="#1a1408"/>
    <circle cx="256" cy="330" r="44" fill="none" stroke="#8a5a2b" stroke-width="6"/>
    <!-- ブリッジ -->
    <rect x="226" y="404" width="60" height="14" rx="6" fill="#5d3a18"/>
    <!-- 弦 -->
    <g stroke="#f7f0dd" stroke-width="2.4" opacity="0.9">
      <line x1="244" y1="76" x2="244" y2="404"/>
      <line x1="250" y1="76" x2="250" y2="404"/>
      <line x1="256" y1="76" x2="256" y2="404"/>
      <line x1="262" y1="76" x2="262" y2="404"/>
      <line x1="268" y1="76" x2="268" y2="404"/>
    </g>
  </g>
</svg>
