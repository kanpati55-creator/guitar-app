<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8bd55"/>
      <stop offset="0.55" stop-color="#eb9c22"/>
      <stop offset="1" stop-color="#d07c0a"/>
    </linearGradient>
    <radialGradient id="holeShade" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0" stop-color="#2a1c06"/>
      <stop offset="0.8" stop-color="#140d03"/>
      <stop offset="1" stop-color="#0a0602"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.42" r="0.9">
      <stop offset="0.62" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.28"/>
    </radialGradient>
  </defs>

  <!-- ギターのボディ（木目のアップ） -->
  <rect width="512" height="512" fill="url(#wood)"/>
  <!-- 木目 -->
  <g stroke="#b9700d" stroke-width="3" opacity="0.28" fill="none">
    <path d="M-20 90 Q 256 70 532 100"/>
    <path d="M-20 150 Q 256 128 532 158"/>
    <path d="M-20 460 Q 256 480 532 452"/>
  </g>

  <!-- サウンドホールの飾り（ロゼッタ） -->
  <circle cx="256" cy="238" r="164" fill="none" stroke="#7a4a10" stroke-width="14"/>
  <circle cx="256" cy="238" r="150" fill="none" stroke="#fbe6bd" stroke-width="5"/>

  <!-- サウンドホール -->
  <circle cx="256" cy="238" r="138" fill="url(#holeShade)"/>

  <!-- ブリッジ -->
  <rect x="116" y="424" width="280" height="52" rx="20" fill="#4a2c0d"/>
  <g fill="#fbe6bd">
    <circle cx="156" cy="461" r="8"/>
    <circle cx="196" cy="461" r="8"/>
    <circle cx="236" cy="461" r="8"/>
    <circle cx="276" cy="461" r="8"/>
    <circle cx="316" cy="461" r="8"/>
    <circle cx="356" cy="461" r="8"/>
  </g>
  <rect x="136" y="434" width="240" height="9" rx="4.5" fill="#fbe6bd"/>

  <!-- 弦（ブリッジから上へ） -->
  <g stroke-linecap="round">
    <line x1="156" y1="443" x2="146" y2="-10" stroke="#f2c988" stroke-width="7"/>
    <line x1="196" y1="443" x2="190" y2="-10" stroke="#f2c988" stroke-width="6"/>
    <line x1="236" y1="443" x2="234" y2="-10" stroke="#f6dcae" stroke-width="5"/>
    <line x1="276" y1="443" x2="278" y2="-10" stroke="#faeccd" stroke-width="4"/>
    <line x1="316" y1="443" x2="322" y2="-10" stroke="#fdf4e0" stroke-width="3.4"/>
    <line x1="356" y1="443" x2="366" y2="-10" stroke="#ffffff" stroke-width="2.8"/>
  </g>

  <!-- 全体を締めるビネット -->
  <rect width="512" height="512" fill="url(#vig)"/>
</svg>
